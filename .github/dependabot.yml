version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    groups:
      turbo:
        patterns:
          - 'turbo'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      drizzle:
        patterns:
          - 'drizzle-orm'
          - 'drizzle-kit'
      nextjs:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      fastify:
        patterns:
          - 'fastify'
          - '@fastify/*'
    ignore:
      # Major version bumps require manual review
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
